<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLASH Home</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0F172A;
            color: #F8FAFC;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background-color: #38BDF8;
            border-radius: 22px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
        }
        .logo-slash {
            width: 50px;
            height: 50px;
            fill: none;
            stroke: #FFFFFF;
            stroke-width: 10;
            stroke-linecap: round;
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
            color: #FFFFFF;
        }
        p {
            color: #94A3B8;
            font-size: 16px;
            margin: 0 0 32px 0;
        }
        .search-form {
            width: 100%;
            margin-bottom: 40px;
        }
        .search-box {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            border-radius: 30px;
            border: 2px solid #334155;
            background-color: #1E293B;
            color: #F8FAFC;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .search-box:focus {
            border-color: #38BDF8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .quick-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
        }
        .link-card {
            background-color: #1E293B;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px 12px;
            text-decoration: none;
            color: #F8FAFC;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
        }
        .link-card:hover {
            border-color: #38BDF8;
            background-color: #334155;
            transform: translateY(-2px);
        }
        .link-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <svg class="logo-slash" viewBox="0 0 108 108">
                <path d="M38 74 L54 34 M54 74 L70 34" />
            </svg>
        </div>
        <h1>SLASH</h1>
        <p>Secure, Localized Web Browser</p>
        
        <form class="search-form" action="https://duckduckgo.com/" method="get">
            <input type="text" name="q" class="search-box" placeholder="Search securely with DuckDuckGo or enter URL..." autofocus autocomplete="off">
        </form>
        
        <div class="quick-links">
            <a href="https://github.com" class="link-card">
                <span class="link-icon">🐙</span>
                <span>GitHub</span>
            </a>
            <a href="https://youtube.com" class="link-card">
                <span class="link-icon">📺</span>
                <span>YouTube</span>
            </a>
            <a href="https://wikipedia.org" class="link-card">
                <span class="link-icon">📖</span>
                <span>Wikipedia</span>
            </a>
            <a href="https://ai.studio" class="link-card">
                <span class="link-icon">✨</span>
                <span>AI Studio</span>
            </a>
        </div>
    </div>
</body>
</html>
